name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Syntax check
        run: |
          python -m py_compile brusnika_lms/__init__.py
          python -m py_compile brusnika_lms/hooks.py
          python -m py_compile brusnika_lms/brusnika_lms/doctype/brusnika_lms_settings/brusnika_lms_settings.py

      - name: Flake8 style check
        run: flake8 brusnika_lms --max-line-length=120 --exclude=__pycache__ --ignore=F401,E501
